<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Historias</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/modals.css">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Fondo Neon -->
    <div class="background-glow"></div>

    <!-- Header -->
    <header>
        <h1>Gestor de Historias</h1>
        <p>Microservicios · Slim Framework · Eloquent ORM</p>
    </header>

    <!-- Contenedor Principal -->
    <main class="contenedor">

        <!-- ══════════════════════════════
             CARD: SPRINTS
        ══════════════════════════════ -->
        <section class="card neon-card">

            <h2>Sprints</h2>

            <form id="formSprint">

                <input
                    type="text"
                    id="nombreSprint"
                    placeholder="Nombre del sprint"
                    required
                >

                <div class="form-row">
                    <div class="form-group">
                        <label for="fechaInicio">Fecha inicio</label>
                        <input type="date" id="fechaInicio" required>
                    </div>
                    <div class="form-group">
                        <label for="fechaFin">Fecha fin</label>
                        <input type="date" id="fechaFin" required>
                    </div>
                </div>

                <button type="submit">Crear Sprint</button>

            </form>

            <!-- Lista de sprints -->
            <div id="listaSprints"></div>

        </section>

        <!-- ══════════════════════════════
             CARD: HISTORIAS
        ══════════════════════════════ -->
        <section class="card neon-card">

            <h2>Historias de Usuario</h2>

            <form id="formHistoria">

                <input
                    type="text"
                    id="titulo"
                    placeholder="Título de la historia"
                    required
                >

                <textarea
                    id="descripcion"
                    placeholder="Descripción detallada..."
                ></textarea>

                <div class="form-row">
                    <div class="form-group">
                        <label for="responsable">Responsable</label>
                        <input type="text" id="responsable" placeholder="Nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="puntos">Puntos</label>
                        <input type="number" id="puntos" placeholder="1 – 100" min="1" max="100" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="estado">Estado</label>
                        <select id="estado">
                            <option value="nueva">Nueva</option>
                            <option value="activa">Activa</option>
                            <option value="finalizada">Finalizada</option>
                            <option value="impedimento">Impedimento</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="sprintId">Sprint</label>
                        <select id="sprintId"></select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="fechaCreacion">Fecha creación</label>
                        <input type="date" id="fechaCreacion" required>
                    </div>
                    <div class="form-group">
                        <label for="fechaFinalizacion">Fecha finalización <span class="opcional">(opcional)</span></label>
                        <input type="date" id="fechaFinalizacion">
                    </div>
                </div>

                <button type="submit">Crear Historia</button>

            </form>

            <!-- Lista de historias -->
            <div id="listaHistorias"></div>

        </section>

    </main>

    <!-- Modal de edición (se inyecta desde modal.js) -->
    <div id="modalContainer"></div>

    <!-- JS -->
    <script src="js/sprints.js"></script>
    <script src="js/historias.js"></script>
    <script src="js/modal.js"></script>

</body>

</html>
